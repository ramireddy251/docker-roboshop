services:
  catalogue:
    build:
      dockerfile: catalogue.Dockerfile
    image: catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb  
  mongodb:
    build:
      dockerfile: mongodb.Dockerfile # it moves to mongodb directory
    image: mongodb:1.0.0 # docker build -t mongodb:1.0.0
    container_name: mongodb


networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create network manually
